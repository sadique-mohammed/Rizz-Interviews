<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexus favicon">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- rounded background -->
  <rect x="0.8" y="0.8" width="30.4" height="30.4" rx="6" ry="6" fill="url(#g)" filter="url(#s)"/>

  <!-- connecting lines (N / node links) -->
  <g stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.98">
    <path d="M8.5 22.5 L13.5 9.5 L23.5 22.5"/>
  </g>

  <!-- nodes -->
  <g fill="#fff">
    <circle cx="8.5" cy="22.5" r="2.2"/>
    <circle cx="13.5" cy="9.5" r="2.2"/>
    <circle cx="23.5" cy="22.5" r="2.2"/>
  </g>
</svg>
